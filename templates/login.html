{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Taham spa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<div class="container">
  <div class="login-card card shadow-lg p-4 p-md-5">
    <div class="text-center mb-4">
      <div class="login-logo"><i class="bi bi-clipboard2-check-fill"></i></div>
      <h1 class="h3 fw-bold text-primary mt-2">Taham spa</h1>
      <p class="text-muted small">Sistema de Auditoría de Bodegas</p>
    </div>

    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-danger py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="username" class="form-label fw-medium">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control form-control-lg" id="username" name="username"
                 placeholder="admin" autocomplete="username" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label fw-medium">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control form-control-lg" id="password" name="password"
                 placeholder="••••••••" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="text-muted small mb-0">Demo: <code>admin</code> / <code>password123</code></p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
